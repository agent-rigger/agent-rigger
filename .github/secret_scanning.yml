# GitHub secret scanning configuration.
#
# The vhs-recordings scan-blocked flow (R3) needs a versioned catalog fixture that
# carries a PLANTED, FAKE, INERT AWS key so gitleaks blocks the install on camera.
# That key is intentionally shaped to match the default `aws-access-token` rule.
# Without this exclusion, secret scanning would raise a permanent alert — even
# though the value is not a real credential (no account, no access, nothing to
# revoke; see the fixture's SKILL.md and validate.sh).
#
# Scope of this file: it silences secret scanning ALERTS only. Push protection is
# NOT governed by paths-ignore — if push protection is enabled on the repo, the
# first push of the fixture may still be blocked and needs a one-off bypass
# (safe here: the value is fake and inert). The exclusion is scoped to the
# fixtures tree only.
paths-ignore:
  - "docs/tapes/fixtures/**"
