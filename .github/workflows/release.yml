name: Release

# Build standalone binaries for every supported platform and attach them to a
# GitHub Release. Bun cross-compiles all targets from a single host
# (`bun build --compile --target=...`), so one ubuntu job produces the full
# matrix — no per-OS runners or artifact passing required.
#
# A second job (`formula`) then renders the Homebrew formula from the released
# checksums and pushes it to the tap. It runs here — as `needs: release` in the
# SAME workflow — rather than on a separate `release: published` trigger, because
# GitHub does NOT fire workflows for events emitted by the GITHUB_TOKEN (the
# release is published by action-gh-release using that token), so a standalone
# `on: release` workflow would never run. Keeping it in this run sidesteps that.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create the release and upload assets

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build binaries & publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Guard — CHANGELOG has a non-empty section for this tag
        # Fail-closed (decision C1): a release must ship a rotated changelog.
        # Rotation is a local, zero-LLM step run before tagging (CONTRIBUTING.md
        # § Releasing). If it was skipped, stop here — before install or build —
        # with the exact command to run, rather than publishing an undocumented
        # release. Two invariants, both fail-closed:
        #   1. the `## [VERSION]` section header exists (rotation produced it);
        #   2. that section has real content, not just blank lines — a header
        #      hand-added above an empty section (bypassing the rotation script,
        #      whose own empty-release guard would have refused) must not pass.
        # The section body is every line after the header up to the next `## [`
        # heading, or EOF. The version is a semver string and can carry ERE
        # metacharacters beyond the dot (e.g. a `+build` suffix, where `+` is
        # an ERE quantifier) — every metacharacter is escaped, not just dots,
        # so the grep header match is exact regardless of tag shape; awk
        # matches the header literally (index), anchored at column 1.
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION_RE=$(printf '%s' "$VERSION" | sed -E 's/[][(){}.*+^$?|\\]/\\&/g')
          if ! grep -qE "^## \[${VERSION_RE}\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no \"## [${VERSION}]\" section for tag ${GITHUB_REF_NAME}."
            echo "Rotate the changelog before tagging (see CONTRIBUTING.md § Releasing):"
            echo "    bun scripts/release-changelog.ts ${VERSION}"
            echo "    git commit -am \"chore(release): ${VERSION}\""
            echo "    git tag ${GITHUB_REF_NAME} && git push origin main --follow-tags"
            exit 1
          fi
          section=$(awk -v hdr="## [${VERSION}]" '
            in_section && /^## \[/ { exit }
            index($0, hdr) == 1   { in_section = 1; next }
            in_section            { print }
          ' CHANGELOG.md)
          if ! grep -q '[^[:space:]]' <<<"$section"; then
            echo "::error::CHANGELOG.md has a \"## [${VERSION}]\" header but its section is empty for tag ${GITHUB_REF_NAME}."
            echo "A release section must list what it ships — do not hand-add an empty header."
            echo "Rotate the changelog so [Unreleased] entries move under this version (CONTRIBUTING.md § Releasing):"
            echo "    bun scripts/release-changelog.ts ${VERSION}"
            exit 1
          fi
          echo "CHANGELOG.md has a non-empty \"## [${VERSION}]\" section — proceeding."

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies (frozen)
        run: bun install --frozen-lockfile

      - name: Sanity — lint · format · types · test
        run: |
          bun run lint
          bun run format:check
          bun run typecheck
          bun test

      - name: Stamp version from tag
        # The git tag is the source of truth for the released version. Stamp it
        # into package.json (build-only, not committed) so the compiled binary —
        # which inlines package.json via the version import — reports the tag.
        working-directory: packages/cli
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          tmp=$(mktemp)
          jq --arg v "$VERSION" '.version = $v' package.json > "$tmp" && mv "$tmp" package.json
          echo "Stamped version: $VERSION"

      - name: Build standalone binaries (all targets)
        working-directory: packages/cli
        run: |
          mkdir -p dist
          bun build --compile --target=bun-linux-x64     --outfile dist/agent-rigger-linux-x64       src/cli.ts
          bun build --compile --target=bun-linux-arm64   --outfile dist/agent-rigger-linux-arm64     src/cli.ts
          bun build --compile --target=bun-darwin-x64    --outfile dist/agent-rigger-darwin-x64      src/cli.ts
          bun build --compile --target=bun-darwin-arm64  --outfile dist/agent-rigger-darwin-arm64    src/cli.ts
          bun build --compile --target=bun-windows-x64   --outfile dist/agent-rigger-windows-x64.exe src/cli.ts

      - name: Smoke-test the linux-x64 binary
        working-directory: packages/cli
        # Assert the stamped version round-trips: --version must report exactly the
        # tag with its leading "v" stripped. A drift here means the stamp step or the
        # version resolver regressed, and the release must not publish.
        run: |
          chmod +x dist/agent-rigger-linux-x64
          EXPECTED="${GITHUB_REF_NAME#v}"
          ACTUAL="$(./dist/agent-rigger-linux-x64 --version)"
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::--version reported \"${ACTUAL}\", expected \"${EXPECTED}\" (tag ${GITHUB_REF_NAME})."
            exit 1
          fi
          echo "Smoke test OK — --version reports \"${ACTUAL}\"."

      - name: Checksums
        working-directory: packages/cli/dist
        run: sha256sum agent-rigger-* > SHA256SUMS.txt

      - name: Bundle LICENSE & DISCLAIMER with the binaries
        # A user who downloads a release binary directly (not via git clone) has
        # no LICENSE/DISCLAIMER.md next to it. Copy both repo-root files into
        # dist/ so they attach to the release. Runs after Checksums on purpose —
        # SHA256SUMS.txt stays scoped to the binaries (glob agent-rigger-*).
        # Fail-closed: cp exits non-zero if either source is missing, aborting.
        run: cp LICENSE DISCLAIMER.md packages/cli/dist/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            packages/cli/dist/agent-rigger-linux-x64
            packages/cli/dist/agent-rigger-linux-arm64
            packages/cli/dist/agent-rigger-darwin-x64
            packages/cli/dist/agent-rigger-darwin-arm64
            packages/cli/dist/agent-rigger-windows-x64.exe
            packages/cli/dist/SHA256SUMS.txt
            packages/cli/dist/LICENSE
            packages/cli/dist/DISCLAIMER.md
          generate_release_notes: true
          fail_on_unmatched_files: true

  formula:
    name: Update Homebrew formula
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read # read this repo (render script) + the release assets; the tap is pushed via HOMEBREW_TAP_TOKEN
    steps:
      - name: Gate on tap token
        id: gate
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -n "$TAP_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::HOMEBREW_TAP_TOKEN not set — skipping Homebrew formula update."
          fi

      - name: Checkout source
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/checkout@v5

      - name: Download release checksums
        if: steps.gate.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --pattern SHA256SUMS.txt --dir /tmp

      - name: Render formula
        if: steps.gate.outputs.enabled == 'true'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          bash packaging/homebrew/render-formula.sh "$VERSION" /tmp/SHA256SUMS.txt > /tmp/agent-rigger.rb
          echo "--- rendered formula ---"
          cat /tmp/agent-rigger.rb

      - name: Push to tap
        if: steps.gate.outputs.enabled == 'true'
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/agent-rigger/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp /tmp/agent-rigger.rb tap/Formula/agent-rigger.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/agent-rigger.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date — nothing to push."
            exit 0
          fi
          git commit -m "agent-rigger ${GITHUB_REF_NAME}"
          git push origin HEAD
