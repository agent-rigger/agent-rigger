name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # gitleaks is pinned + checksum-verified so the real-binary scanner smokes
  # (core/scanners/real-binaries.test.ts) run in CI instead of self-skipping.
  # Same version/checksum as recordings-freshness.yml (v8.30.1, linux_x64) — a
  # bump must move both. No mutable installer runs as root: a download/checksum
  # failure reds the job.
  GITLEAKS_VERSION: "8.30.1"
  GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"

jobs:
  quality:
    name: Quality (lint · format · types · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install gitleaks (pinned + checksum)
        run: |
          set -euo pipefail
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL "$url" -o /tmp/gitleaks.tar.gz
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tar.gz" | sha256sum -c -
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install (frozen)
        run: bun install --frozen-lockfile

      - name: Lint (oxlint)
        run: bun run lint

      - name: Format check (dprint)
        run: bun run format:check

      - name: Typecheck (tsc --noEmit)
        run: bun run typecheck

      - name: Test (bun test)
        run: bun test

# Packaging milestone (later): `bun build --compile` standalone binary,
# build matrix ubuntu/macos/windows, upload artifacts, GitHub Release on tag.
