name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality (lint · format · types · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install (frozen)
        run: bun install --frozen-lockfile

      - name: Lint (oxlint)
        run: bun run lint

      - name: Format check (dprint)
        run: bun run format:check

      - name: Typecheck (tsc --noEmit)
        run: bun run typecheck

      - name: Test (bun test)
        run: bun test

# Packaging milestone (later): `bun build --compile` standalone binary,
# build matrix ubuntu/macos/windows, upload artifacts, GitHub Release on tag.
